<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADCS 系統面板</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #34495e;
            --accent-color: #3498db;
            --background-dark: #1a1a2e;
            --text-light: #ecf0f1;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-dark);
            color: var(--text-light);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px 0;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-align: center;
            border-bottom: 3px solid var(--accent-color);
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            width: 100%;
            max-width: 1200px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
        }

        .panel {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 24px;
            backdrop-filter: blur(10px);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.4);
            border-color: var(--accent-color);
        }

        .panel h2 {
            margin-top: 0;
            color: var(--accent-color);
            font-size: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 10px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            margin-top: 15px;
            font-size: 1.2rem;
        }

        .dot {
            height: 12px;
            width: 12px;
            background-color: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            margin-right: 10px;
            box-shadow: 0 0 10px #2ecc71;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
            100% { box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        footer {
            margin-top: auto;
            padding: 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #bdc3c7;
        }
    </style>
</head>
<body>

    <header>
        <h1>ADCS (姿態決定與控制系統) Monitor</h1>
    </header>

    <main>
        <div class="dashboard">
            <!-- 狀態面板 1 -->
            <div class="panel">
                <h2>系統狀態 (System Status)</h2>
                <div class="status-indicator">
                    <span class="dot"></span> 系統連線正常 (Online)
                </div>
                <p>Telemetry 數據傳輸中...</p>
            </div>

            <!-- 狀態面板 2 -->
            <div class="panel">
                <h2>姿態數據 (Attitude Data)</h2>
                <p>Roll: <span id="val-roll">0.00°</span></p>
                <p>Pitch: <span id="val-pitch">0.00°</span></p>
                <p>Yaw: <span id="val-yaw">0.00°</span></p>
            </div>

            <!-- 控制面板 3 -->
            <div class="panel">
                <h2>控制指令 (Control Command)</h2>
                <p>準備接收後端 (Python) 資料...</p>
                <!-- 這裡可以放一些按鈕或圖表 -->
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 ADCS Study Project. All rights reserved.
    </footer>

    <script>
        // 這裡可以寫後續要跟 Python (後端) 互動的 JavaScript 程式碼
        console.log("ADCS 儀表板已載入。準備就緒！");

        // 透過 API 取得後端更新的數據
        async function fetchTelemetry() {
            try {
                const response = await fetch('/api/telemetry');
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById('val-roll').textContent = data.roll.toFixed(2) + '°';
                    document.getElementById('val-pitch').textContent = data.pitch.toFixed(2) + '°';
                    document.getElementById('val-yaw').textContent = data.yaw.toFixed(2) + '°';
                }
            } catch (error) {
                console.error("無法取得遙測數據:", error);
            }
        }

        // 每秒向 FastAPI 後端抓取一次資料
        setInterval(fetchTelemetry, 1000);
        fetchTelemetry(); // 網頁載入時先執行一次
    </script>
</body>
</html>
